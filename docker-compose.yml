version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: pibtv_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user_pibtv
      POSTGRES_PASSWORD: password_pibtv
      POSTGRES_DB: pibtv_db
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: